    const sh=shOf(h);
    const ratio=AVG_SH[sh]>0?(shData[sh]||0)/AVG_SH[sh]:0;
    return Math.round(AVG_H.find(r=>r.h===h).c*ratio);
  });
}

/* Average counts across a set of dates */
function avgCounts(dates){
  if(!dates.length)return AVG_H.map(r=>Math.round(r.c));
  return HOURS.map((_,i)=>{
    const vals=dates.map(d=>dayCounts(d)[i]);
    return Math.round(vals.reduce((a,v)=>a+v,0)/vals.length);
  });
}

function moOf(d){return d.slice(0,7);}
const MO_NAMES={'2026-04':'April 2026','2026-05':'May 2026','2026-06':'June 2026'};

let activeMo='all', activeDay='all';
let flowChart=null, distChart=null;

/* ── Day pills ── */
function buildDayPills(){
  const filtered=activeMo==='all'?allDates:allDates.filter(d=>moOf(d)===activeMo);
  const container=document.getElementById('dayPills');
  container.innerHTML='';

  const all=document.createElement('button');
  all.className='day-pill'+(activeDay==='all'?' active':'');
  all.textContent='All days';
  all.onclick=()=>setDay('all');
  container.appendChild(all);

  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  filtered.forEach(d=>{
    const p=d.split('-');
    const dow=DOW[new Date(+p[0],+p[1]-1,+p[2]).getDay()];
    const btn=document.createElement('button');
    btn.className='day-pill'+(activeDay===d?' active':'');
    btn.innerHTML=`<span style="font-size:9px;color:#999;display:block;line-height:1;margin-bottom:2px">${dow}</span>${p[1]}/${p[2]}`;
    btn.style.textAlign='center';btn.style.lineHeight='1.3';
    btn.onclick=()=>setDay(d);
    container.appendChild(btn);
  });
}

function setMonth(mo){
  activeMo=mo; activeDay='all';
  document.querySelectorAll('[data-mo]').forEach(b=>{b.className='pill';if(b.dataset.mo===mo)b.classList.add('active');});
  buildDayPills(); render();
}

function setDay(d){
  activeDay=d;
  document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

/* ── Main render ── */
function getCounts(){
  if(activeDay!=='all') return dayCounts(activeDay);
  const dates=activeMo==='all'?allDates:allDates.filter(d=>moOf(d)===activeMo);
  return avgCounts(dates);
}

function getTitle(){
  if(activeDay!=='all'){const p=activeDay.split('-');return 'Customer count by hour — '+p[1]+'/'+p[2]+'/'+p[0];}
  if(activeMo!=='all') return 'Avg customer count by hour — '+MO_NAMES[activeMo];
  return 'Avg customer count by hour — all dates';
}

function render(){
  const counts=getCounts();
  const total=counts.reduce((a,v)=>a+v,0);
  const maxVal=Math.max(...counts);
  const peakIdx=counts.indexOf(maxVal);

  document.getElementById('kTotal').textContent=total.toLocaleString();
  document.getElementById('kPeak').textContent=HOURS[peakIdx]||'—';
  document.getElementById('kPeakVal').textContent=maxVal;
  document.getElementById('chartTitle').textContent=getTitle();

  // Max / Min / Avg by day
  const dates=activeDay!=='all'?[activeDay]:(activeMo==='all'?allDates:allDates.filter(d=>moOf(d)===activeMo));
  const dailyTotals=dates.map(d=>({d,c:D.filter(r=>r.d===d).reduce((a,r)=>a+r.c,0)}));
  if(dailyTotals.length){
    const maxDay=dailyTotals.reduce((a,b)=>b.c>a.c?b:a);
    const minDay=dailyTotals.reduce((a,b)=>b.c<a.c?b:a);
    const avgVal=Math.round(dailyTotals.reduce((a,b)=>a+b.c,0)/dailyTotals.length);
    const fmt=d=>{const p=d.split('-');return p[1]+'/'+p[2]+'/'+p[0];};
    const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dow=d=>{const p=d.split('-');return DOW[new Date(+p[0],+p[1]-1,+p[2]).getDay()];};
    document.getElementById('kMax').textContent=maxDay.c.toLocaleString();
    document.getElementById('kMaxDate').textContent=dow(maxDay.d)+' · '+fmt(maxDay.d);
    document.getElementById('kMin').textContent=minDay.c.toLocaleString();
    document.getElementById('kMinDate').textContent=dow(minDay.d)+' · '+fmt(minDay.d);
    document.getElementById('kAvg').textContent=avgVal.toLocaleString();
    document.getElementById('kAvgLbl').textContent='across '+dailyTotals.length+' day'+(dailyTotals.length!==1?'s':'');
  }

  if(flowChart)flowChart.destroy();
  // Compute per-shift averages for reference lines
  const shiftAvg={1:null,2:null,3:null};
  [1,2,3].forEach(sh=>{
    const vals=counts.filter((_,i)=>shOf(HOURS[i])===sh);
    shiftAvg[sh]=vals.length?Math.round(vals.reduce((a,v)=>a+v,0)/vals.length):0;
  });

  // Shift index ranges: sh1=0-11, sh2=12-27, sh3=28-47
  const shiftRanges={1:[0,11],2:[12,27],3:[28,47]};
  const shiftTotals={};
  const shiftRevenue={};
  const activeDates=activeDay!=='all'?[activeDay]:(activeMo==='all'?allDates:allDates.filter(d=>moOf(d)===activeMo));
  [1,2,3].forEach(sh=>{
    const [a,b]=shiftRanges[sh];
    shiftTotals[sh]=counts.slice(a,b+1).reduce((s,v)=>s+v,0);
    shiftRevenue[sh]=activeDates.reduce((sum,d)=>{const r=D.find(x=>x.d===d&&x.sh===sh);return sum+(r?r.s:0);},0);
  });

  // Custom plugin: draw shift total banners above each group
  const shiftTotalPlugin={
    id:'shiftTotals',
    afterDraw(chart){
      const {ctx,scales:{x,y}}=chart;
      const clrs={1:'#185FA5',2:'#0F6E56',3:'#993C1D'};
      const labels={1:'Night total',2:'Morning total',3:'Evening total'};
      [1,2,3].forEach(sh=>{
        const [a,b]=shiftRanges[sh];
        const x1=x.getPixelForValue(a);
        const x2=x.getPixelForValue(b);
        const midX=(x1+x2)/2;
        const topY=y.top-2;
        const clr=clrs[sh];
        // line above bars
        ctx.save();
        ctx.strokeStyle=clr;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(x1,topY+14);ctx.lineTo(x2,topY+14);ctx.stroke();
        // tick marks
        ctx.beginPath();ctx.moveTo(x1,topY+8);ctx.lineTo(x1,topY+14);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x2,topY+8);ctx.lineTo(x2,topY+14);ctx.stroke();
        // label above line
        ctx.fillStyle=clr;ctx.font='bold 10px -apple-system,sans-serif';ctx.textAlign='center';
        ctx.fillText(labels[sh],midX,topY+9);
        // customer count below line (left of center)
        ctx.font='bold 11px -apple-system,sans-serif';
        ctx.fillText('👥 '+shiftTotals[sh].toLocaleString(),midX-30,topY+26);
        // revenue below line (right of center)
        const rev=shiftRevenue[sh];
        const revStr='💰 $'+(rev>=1000?(rev/1000).toFixed(1)+'K':Math.round(rev).toLocaleString());
        ctx.fillText(revStr,midX+38,topY+26);
        ctx.restore();
      });
    }
  };

  flowChart=new Chart(document.getElementById('cFlow'),{
    type:'bar',
    data:{labels:HOURS,datasets:[
      {data:counts,backgroundColor:HOURS.map(h=>shColor(h)),borderRadius:4,borderSkipped:false,
       datalabels:{display:true,anchor:'end',align:'end',offset:1,font:{size:9,weight:'700'},color:'#333',formatter:v=>v}}
    ]},
    plugins:[shiftTotalPlugin],
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>c.parsed.y+' customers'}},
        datalabels:{display:false}
      },
      layout:{padding:{top:48}},
      scales:{
        x:{ticks:{font:{size:9,weight:'600'},color:'#333',maxRotation:45,autoSkip:true,maxTicksLimit:16},grid:{display:false},border:{display:false}},
        y:{ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(0,0,0,.06)'},border:{display:false},title:{display:true,text:'Customers',font:{size:11},color:'#888'}}
      }}
  });

  drawDist(counts);
}

/* ── Distribution curve ── */
function smooth(arr,w=2){
  return arr.map((_,i)=>{
    const sl=arr.slice(Math.max(0,i-w),i+w+1);
    return sl.reduce((a,v)=>a+v,0)/sl.length;
  });
}

function calcSkewness(vals){
  const n=vals.length;
  const mean=vals.reduce((a,v)=>a+v,0)/n;
  const std=Math.sqrt(vals.reduce((a,v)=>a+(v-mean)**2,0)/n);
  if(std===0)return 0;
  return vals.reduce((a,v)=>a+((v-mean)/std)**3,0)/n;
}

function drawDist(counts){
  const smoothed=smooth(counts,2);
  const skew=calcSkewness(counts);

  let label,bg,clr,desc;
  if(skew>0.5){
    label='Right skewed ›'; bg='#faece7'; clr='#993C1D';
    desc='<strong>Right skewed</strong> — most customer traffic is concentrated in the early part of the day with a long tail toward evening. Morning hours drive the highest foot traffic.';
  } else if(skew<-0.5){
    label='‹ Left skewed'; bg='#e6f1fb'; clr='#185FA5';
    desc='<strong>Left skewed</strong> — customer traffic peaks later in the day with a longer tail in the morning. Evening hours are the busiest period.';
  } else {
    label='≈ Normal'; bg='#e1f5ee'; clr='#0F6E56';
    desc='<strong>Normal (bell-shaped)</strong> — traffic rises steadily through the day, peaks around midday or afternoon, then falls off symmetrically. Customer flow is well-distributed around the peak period.';
  }

  const badge=document.getElementById('skewBadge');
  badge.textContent=label; badge.style.background=bg; badge.style.color=clr;

  const descEl=document.getElementById('skewDesc');
  descEl.innerHTML=desc; descEl.style.borderLeftColor=clr;

  if(distChart)distChart.destroy();
  distChart=new Chart(document.getElementById('cDist'),{
    type:'line',
    data:{labels:HOURS,datasets:[{data:smoothed,borderColor:clr,backgroundColor:bg+'cc',borderWidth:2.5,fill:true,tension:0.45,pointRadius:0,pointHoverRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>Math.round(c.parsed.y)+' customers'}},datalabels:{display:false}},
      scales:{
        x:{ticks:{font:{size:9,weight:'600'},color:'#333',maxRotation:45,autoSkip:true,maxTicksLimit:16},grid:{display:false},border:{display:false}},
        y:{ticks:{font:{size:10},color:'#555'},grid:{color:'rgba(0,0,0,.06)'},border:{display:false}}
      }}
  });
}

buildDayPills();
render();
</script>
